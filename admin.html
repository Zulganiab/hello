<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Community Forum</title>
  <meta name="description" content="Admin panel for Community Forum management.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">Community</a>
      <button class="navbar-toggle" aria-label="Toggle navigation">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="groups.html">Groups</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="support.html">Support</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="admin-page">
    <div class="container">
      <!-- Login Form -->
      <div class="admin-login" id="login-section">
        <h1 class="admin-login-title">Admin Login</h1>
        <form id="login-form">
          <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" class="form-input" placeholder="Enter username" required>
          </div>
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
      </div>

      <!-- Dashboard -->
      <div class="admin-dashboard" id="dashboard-section">
        <!-- Header -->
        <header class="admin-header">
          <h1 class="admin-title">Admin Dashboard</h1>
          <button class="btn btn-secondary" id="logout-btn">Logout</button>
        </header>

        <!-- Tabs -->
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="posts">Posts</button>
          <button class="admin-tab" data-tab="groups">Groups</button>
          <button class="admin-tab" data-tab="comments">Comments</button>
          <button class="admin-tab" data-tab="messages">Messages</button>
          <button class="admin-tab" data-tab="admins">Admins</button>
        </div>

        <!-- Posts Panel -->
        <div class="admin-panel active" id="posts-panel">
          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">Create New Post</h2>
            </div>
            <form id="create-post-form">
              <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" id="post-title" class="form-input" placeholder="Post title" required>
              </div>
              <div class="form-group">
                <label class="form-label">Content</label>
                <textarea id="post-content" class="form-textarea" placeholder="Post content" required></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Image URL (optional)</label>
                <input type="url" id="post-image" class="form-input" placeholder="https://example.com/image.jpg">
              </div>
              <div class="form-group">
                <label class="form-label">Group</label>
                <select id="post-group" class="form-input" required>
                  <!-- Groups will be loaded here -->
                </select>
              </div>
              <button type="submit" class="btn btn-primary">Create Post</button>
            </form>
          </div>

          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">All Posts</h2>
            </div>
            <div class="admin-list" id="posts-list">
              <!-- Posts will be loaded here -->
            </div>
          </div>
        </div>

        <!-- Groups Panel -->
        <div class="admin-panel" id="groups-panel">
          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">Create New Group</h2>
            </div>
            <form id="create-group-form">
              <div class="form-group">
                <label class="form-label">Group Name</label>
                <input type="text" id="group-name" class="form-input" placeholder="Group name" required>
              </div>
              <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="group-description" class="form-textarea" placeholder="Group description"></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Create Group</button>
            </form>
          </div>

          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">All Groups</h2>
            </div>
            <div class="admin-list" id="groups-list">
              <!-- Groups will be loaded here -->
            </div>
          </div>
        </div>

        <!-- Comments Panel -->
        <div class="admin-panel" id="comments-panel">
          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">All Comments</h2>
            </div>
            <div class="admin-list" id="comments-list">
              <!-- Comments will be loaded here -->
            </div>
          </div>
        </div>

        <!-- Messages Panel -->
        <div class="admin-panel" id="messages-panel">
          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">Support Messages</h2>
            </div>
            <div class="admin-list" id="messages-list">
              <!-- Messages will be loaded here -->
            </div>
          </div>
        </div>

        <!-- Admins Panel -->
        <div class="admin-panel" id="admins-panel">
          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">Add New Admin</h2>
            </div>
            <form id="add-admin-form">
              <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="new-admin-username" class="form-input" placeholder="Username" required>
              </div>
              <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="new-admin-password" class="form-input" placeholder="Password" required>
              </div>
              <button type="submit" class="btn btn-primary">Add Admin</button>
            </form>
          </div>

          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">Change Your Password</h2>
            </div>
            <form id="change-password-form">
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" id="current-password" class="form-input" placeholder="Current password" required>
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" id="new-password" class="form-input" placeholder="New password" required>
              </div>
              <button type="submit" class="btn btn-primary">Change Password</button>
            </form>
          </div>

          <div class="admin-card">
            <div class="admin-card-header">
              <h2 class="admin-card-title">All Admins</h2>
            </div>
            <div class="admin-list" id="admins-list">
              <!-- Admins will be loaded here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-content">
      <p class="footer-text">&copy; 2024 Community Forum. All rights reserved.</p>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="support.html">Support</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    // ==================== State ====================
    let isAuthenticated = false;

    // ==================== DOM Elements ====================
    const loginSection = document.getElementById('login-section');
    const dashboardSection = document.getElementById('dashboard-section');
    const loginForm = document.getElementById('login-form');
    const logoutBtn = document.getElementById('logout-btn');

    // ==================== Auth Functions ====================
    async function checkAuth() {
      if (Community.isLoggedIn()) {
        const valid = await Community.validateToken();
        if (valid) {
          showDashboard();
          return;
        }
        Community.clearAuthToken();
      }
      showLogin();
    }

    function showLogin() {
      loginSection.style.display = 'block';
      dashboardSection.classList.remove('active');
      isAuthenticated = false;
    }

    function showDashboard() {
      loginSection.style.display = 'none';
      dashboardSection.classList.add('active');
      isAuthenticated = true;
      loadAllData();
    }

    // ==================== Login ====================
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await Community.adminLogin(username, password);
        Community.setAuthToken(response.token);
        Community.showNotification('Login successful!');
        showDashboard();
      } catch (error) {
        Community.showNotification(error.message || 'Login failed', 'error');
      }
    });

    // ==================== Logout ====================
    logoutBtn.addEventListener('click', async () => {
      try {
        await Community.adminLogout();
      } catch (e) {
        // Ignore logout errors
      }
      Community.clearAuthToken();
      Community.showNotification('Logged out');
      showLogin();
    });

    // ==================== Tabs ====================
    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        // Update tab states
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        // Update panel states
        document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
      });
    });

    // ==================== Load Data ====================
    async function loadAllData() {
      loadPosts();
      loadGroups();
      loadComments();
      loadMessages();
      loadAdmins();
      loadGroupsSelect();
    }

    async function loadGroupsSelect() {
      try {
        const groups = await Community.getGroups();
        const select = document.getElementById('post-group');
        select.innerHTML = '<option value="">Select a group</option>' +
          groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
      } catch (error) {
        console.error('Failed to load groups for select:', error);
      }
    }

    async function loadPosts() {
      const container = document.getElementById('posts-list');
      container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
      
      try {
        const posts = await Community.getPosts();
        if (posts.length === 0) {
          container.innerHTML = '<p class="text-muted text-center">No posts yet</p>';
          return;
        }
        
        container.innerHTML = posts.map(post => `
          <div class="admin-list-item">
            <div class="admin-list-item-content">
              <div class="admin-list-item-title">${post.title}</div>
              <div class="admin-list-item-meta">${post.groupName} &bull; ${Community.formatDate(post.createdAt)}</div>
            </div>
            <button class="btn btn-danger btn-sm" onclick="deletePost('${post.id}')">Delete</button>
          </div>
        `).join('');
      } catch (error) {
        container.innerHTML = '<p class="text-muted text-center">Failed to load posts</p>';
      }
    }

    async function loadGroups() {
      const container = document.getElementById('groups-list');
      container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
      
      try {
        const groups = await Community.getGroups();
        if (groups.length === 0) {
          container.innerHTML = '<p class="text-muted text-center">No groups yet</p>';
          return;
        }
        
        container.innerHTML = groups.map(group => `
          <div class="admin-list-item">
            <div class="admin-list-item-content">
              <div class="admin-list-item-title">${group.name}</div>
              <div class="admin-list-item-meta">${group.description || 'No description'}</div>
            </div>
            <button class="btn btn-danger btn-sm" onclick="deleteGroup('${group.id}')">Delete</button>
          </div>
        `).join('');
      } catch (error) {
        container.innerHTML = '<p class="text-muted text-center">Failed to load groups</p>';
      }
    }

    async function loadComments() {
      const container = document.getElementById('comments-list');
      container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
      
      try {
        const comments = await Community.getAllComments();
        if (comments.length === 0) {
          container.innerHTML = '<p class="text-muted text-center">No comments yet</p>';
          return;
        }
        
        container.innerHTML = comments.map(comment => `
          <div class="admin-list-item">
            <div class="admin-list-item-content">
              <div class="admin-list-item-title">${Community.truncateText(comment.text, 100)}</div>
              <div class="admin-list-item-meta">On: ${comment.postTitle} &bull; ${Community.formatDate(comment.createdAt)}</div>
            </div>
            <button class="btn btn-danger btn-sm" onclick="deleteComment('${comment.id}')">Delete</button>
          </div>
        `).join('');
      } catch (error) {
        container.innerHTML = '<p class="text-muted text-center">Failed to load comments</p>';
      }
    }

    async function loadMessages() {
      const container = document.getElementById('messages-list');
      container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
      
      try {
        const messages = await Community.getMessages();
        if (messages.length === 0) {
          container.innerHTML = '<p class="text-muted text-center">No messages yet</p>';
          return;
        }
        
        container.innerHTML = messages.map(message => `
          <div class="admin-list-item">
            <div class="admin-list-item-content">
              <div class="admin-list-item-title">${message.name || 'Anonymous'}</div>
              <div class="admin-list-item-meta">${Community.truncateText(message.message, 150)}</div>
              <div class="admin-list-item-meta">${Community.formatDate(message.createdAt)}</div>
            </div>
            <button class="btn btn-danger btn-sm" onclick="deleteMessage('${message.id}')">Delete</button>
          </div>
        `).join('');
      } catch (error) {
        container.innerHTML = '<p class="text-muted text-center">Failed to load messages</p>';
      }
    }

    async function loadAdmins() {
      const container = document.getElementById('admins-list');
      container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
      
      try {
        const admins = await Community.getAdmins();
        container.innerHTML = admins.map(admin => `
          <div class="admin-list-item">
            <div class="admin-list-item-content">
              <div class="admin-list-item-title">${admin.username}</div>
            </div>
            <button class="btn btn-danger btn-sm" onclick="removeAdmin('${admin.username}')">Remove</button>
          </div>
        `).join('');
      } catch (error) {
        container.innerHTML = '<p class="text-muted text-center">Failed to load admins</p>';
      }
    }

    // ==================== CRUD Operations ====================
    // Create Post
    document.getElementById('create-post-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        title: document.getElementById('post-title').value,
        content: document.getElementById('post-content').value,
        image: document.getElementById('post-image').value,
        groupId: document.getElementById('post-group').value
      };
      
      try {
        await Community.createPost(data);
        Community.showNotification('Post created!');
        e.target.reset();
        loadPosts();
      } catch (error) {
        Community.showNotification(error.message || 'Failed to create post', 'error');
      }
    });

    // Delete Post
    async function deletePost(id) {
      if (!confirm('Are you sure you want to delete this post?')) return;
      
      try {
        await Community.deletePost(id);
        Community.showNotification('Post deleted');
        loadPosts();
      } catch (error) {
        Community.showNotification('Failed to delete post', 'error');
      }
    }

    // Create Group
    document.getElementById('create-group-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        name: document.getElementById('group-name').value,
        description: document.getElementById('group-description').value
      };
      
      try {
        await Community.createGroup(data);
        Community.showNotification('Group created!');
        e.target.reset();
        loadGroups();
        loadGroupsSelect();
      } catch (error) {
        Community.showNotification(error.message || 'Failed to create group', 'error');
      }
    });

    // Delete Group
    async function deleteGroup(id) {
      if (!confirm('Are you sure you want to delete this group?')) return;
      
      try {
        await Community.deleteGroup(id);
        Community.showNotification('Group deleted');
        loadGroups();
        loadGroupsSelect();
      } catch (error) {
        Community.showNotification('Failed to delete group', 'error');
      }
    }

    // Delete Comment
    async function deleteComment(id) {
      if (!confirm('Are you sure you want to delete this comment?')) return;
      
      try {
        await Community.deleteComment(id);
        Community.showNotification('Comment deleted');
        loadComments();
      } catch (error) {
        Community.showNotification('Failed to delete comment', 'error');
      }
    }

    // Delete Message
    async function deleteMessage(id) {
      if (!confirm('Are you sure you want to delete this message?')) return;
      
      try {
        await Community.deleteMessage(id);
        Community.showNotification('Message deleted');
        loadMessages();
      } catch (error) {
        Community.showNotification('Failed to delete message', 'error');
      }
    }

    // Add Admin
    document.getElementById('add-admin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('new-admin-username').value;
      const password = document.getElementById('new-admin-password').value;
      
      try {
        await Community.addAdmin(username, password);
        Community.showNotification('Admin added!');
        e.target.reset();
        loadAdmins();
      } catch (error) {
        Community.showNotification(error.message || 'Failed to add admin', 'error');
      }
    });

    // Remove Admin
    async function removeAdmin(username) {
      if (!confirm(`Are you sure you want to remove ${username}?`)) return;
      
      try {
        await Community.removeAdmin(username);
        Community.showNotification('Admin removed');
        loadAdmins();
      } catch (error) {
        Community.showNotification(error.message || 'Failed to remove admin', 'error');
      }
    }

    // Change Password
    document.getElementById('change-password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const currentPassword = document.getElementById('current-password').value;
      const newPassword = document.getElementById('new-password').value;
      
      try {
        await Community.changePassword(currentPassword, newPassword);
        Community.showNotification('Password changed!');
        e.target.reset();
      } catch (error) {
        Community.showNotification(error.message || 'Failed to change password', 'error');
      }
    });

    // ==================== Initialize ====================
    checkAuth();
  </script>
</body>
</html>
