<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group - Community Forum</title>
  <meta name="description" content="Browse posts from this community group.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">Community</a>
      <button class="navbar-toggle" aria-label="Toggle navigation">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="groups.html" class="active">Groups</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="support.html">Support</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <!-- Group Header -->
    <section class="group-header" id="group-header">
      <div class="container">
        <a href="groups.html" class="post-back mb-lg" style="display: inline-flex;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          All Groups
        </a>
        <div class="loading">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </section>

    <!-- Posts Grid -->
    <section class="container">
      <div class="posts-grid" id="posts-container">
        <!-- Posts will be loaded here -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-content">
      <p class="footer-text">&copy; 2024 Community Forum. All rights reserved.</p>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="support.html">Support</a>
        <a href="admin.html">Admin</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    const groupId = new URLSearchParams(window.location.search).get('id');
    
    if (!groupId) {
      window.location.href = 'groups.html';
    }

    // Load group info
    async function loadGroup() {
      const container = document.getElementById('group-header');
      
      try {
        const group = await Community.getGroup(groupId);
        document.title = `${group.name} - Community Forum`;
        
        container.innerHTML = `
          <div class="container">
            <a href="groups.html" class="post-back mb-lg" style="display: inline-flex;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
              </svg>
              All Groups
            </a>
            <h1 class="group-name">${group.name}</h1>
            <p class="group-description">${group.description || 'Welcome to this community group!'}</p>
          </div>
        `;
        
        loadPosts();
      } catch (error) {
        console.error('Failed to load group:', error);
        container.innerHTML = `
          <div class="container">
            <div class="empty-state">
              <div class="empty-state-icon">404</div>
              <p class="empty-state-text">Group not found</p>
              <a href="groups.html" class="btn btn-primary mt-lg">Browse Groups</a>
            </div>
          </div>
        `;
      }
    }

    // Load posts for this group
    async function loadPosts() {
      const container = document.getElementById('posts-container');
      Community.showLoading(container);
      
      try {
        const posts = await Community.getPostsByGroup(groupId);
        
        if (posts.length === 0) {
          Community.showEmpty(container, 'No posts in this group yet');
          return;
        }
        
        container.innerHTML = '';
        posts.forEach(post => {
          container.appendChild(Community.createPostCard(post));
        });
      } catch (error) {
        console.error('Failed to load posts:', error);
        Community.showEmpty(container, 'Failed to load posts');
      }
    }

    // Initialize
    loadGroup();
  </script>
</body>
</html>
