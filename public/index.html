<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Forum - Share & Discuss</title>
  <meta name="description" content="A modern community forum for sharing ideas and engaging in discussions.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">Community</a>
      <button class="navbar-toggle" aria-label="Toggle navigation">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <ul class="navbar-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="groups.html">Groups</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="support.html">Support</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <!-- Hero Section -->
    <section class="hero">
      <div class="container">
        <h1>Welcome to the Community</h1>
        <p>Discover discussions, share your thoughts, and connect with others who share your interests.</p>
      </div>
    </section>

    <!-- Groups Section -->
    <section class="groups-section">
      <div class="container">
        <h2 class="groups-title">Browse Groups</h2>
        <div class="groups-grid" id="groups-container">
          <!-- Groups will be loaded here -->
        </div>
      </div>
    </section>

    <!-- Posts Grid -->
    <section class="container">
      <h2 class="groups-title">Latest Posts</h2>
      <div class="posts-grid" id="posts-container">
        <!-- Posts will be loaded here -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-content">
      <p class="footer-text">&copy; 2024 Community Forum. All rights reserved.</p>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="support.html">Support</a>
        <a href="admin.html">Admin</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    // Load groups
    async function loadGroups() {
      const container = document.getElementById('groups-container');
      Community.showLoading(container);
      
      try {
        const groups = await Community.getGroups();
        if (groups.length === 0) {
          Community.showEmpty(container, 'No groups available');
          return;
        }
        
        container.innerHTML = '';
        groups.forEach(group => {
          container.appendChild(Community.createGroupCard(group));
        });
      } catch (error) {
        console.error('Failed to load groups:', error);
        Community.showEmpty(container, 'Failed to load groups');
      }
    }

    // Load posts
    async function loadPosts() {
      const container = document.getElementById('posts-container');
      Community.showLoading(container);
      
      try {
        const posts = await Community.getPosts();
        if (posts.length === 0) {
          Community.showEmpty(container, 'No posts yet. Check back soon!');
          return;
        }
        
        container.innerHTML = '';
        posts.forEach(post => {
          container.appendChild(Community.createPostCard(post));
        });
      } catch (error) {
        console.error('Failed to load posts:', error);
        Community.showEmpty(container, 'Failed to load posts');
      }
    }

    // Initialize
    loadGroups();
    loadPosts();
  </script>
</body>
</html>
